services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: >
      uvicorn claims_pipeline.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/claims.db
      UPLOAD_DIR: /data/uploads
    volumes:
      - claims_sqlite:/data
      - claims_uploads:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  claim-worker:
    build: .
    command: python -m claims_pipeline.workers.claim_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/claims.db
      UPLOAD_DIR: /data/uploads
    volumes:
      - claims_sqlite:/data
      - claims_uploads:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  llm-worker:
    build: .
    command: python -m claims_pipeline.workers.llm_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  streamlit:
    build: .
    command: >
      streamlit run src/claims_pipeline/ui/app.py
      --server.address=0.0.0.0
      --server.port=8501
      --browser.gatherUsageStats=false
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      CLAIMS_API_URL: http://api:8000
      PUBLIC_CLAIMS_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  claims_sqlite:
  claims_uploads:
