<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; margin: 0; background: white; }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 20px; }
        .lab-name { font-size: 24px; font-weight: bold; }
        .patient-info { display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        .report-title { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        .test-result { margin-bottom: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="lab-name">PRECISION DIAGNOSTICS PVT LTD</div>
        <div>NABL Accredited Lab</div>
    </div>
    
    <div class="patient-info">
        <div>
            <strong>Patient:</strong> {{ content.patient_name | default('Rajesh Kumar') }}<br>
        </div>
        <div>
            <strong>Date:</strong> 01-Nov-2024
        </div>
    </div>

    <div class="report-title">LABORATORY REPORT</div>

    <div class="test-result">
        <strong>Test Name:</strong> {{ content.test_name | default('Complete Blood Count') }}<br><br>
        <strong>Result:</strong> WITHIN NORMAL LIMITS
    </div>

</body>
</html>
