<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; margin: 0; background: white; }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 20px; }
        .pharmacy-name { font-size: 24px; font-weight: bold; }
        .bill-info { display: flex; justify-content: space-between; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; }
        th { background-color: #f0f0f0; }
        .totals { width: 300px; float: right; }
        .totals-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .totals-row.bold { font-weight: bold; border-top: 1px solid #000; }
    </style>
</head>
<body>
    <div class="header">
        <div class="pharmacy-name">HEALTH FIRST PHARMACY</div>
        <div>22 Brigade Road, Bengaluru</div>
    </div>
    
    <div class="bill-info">
        <div>
            <strong>Patient:</strong> {{ content.patient_name | default('Rajesh Kumar') }}
        </div>
        <div>
            <strong>Date:</strong> 01-Nov-2024
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>MEDICINE</th>
                <th>AMOUNT</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Medicines</td>
                <td>{{ content.total | default(500) }}</td>
            </tr>
        </tbody>
    </table>

    <div class="totals">
        <div class="totals-row bold">
            <span>Net Amount:</span>
            <span>{{ content.total | default(500) }}</span>
        </div>
    </div>
</body>
</html>
